<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C4568C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sei Unica">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>✂️ Sei Unica Mobile</title>
<!-- PWA -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sei Unica">
<meta name="theme-color" content="#C4568C">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FBF5F9; --card: #FFFFFF; --accent: #C4568C; --accent-dark: #9E3D6E;
    --accent-light: #F8E0ED; --text: #2E2233; --text-muted: #8A7585;
    --border: #E8D8E0; --success: #7BA59F; --purple: #9B8EC4;
    --bottom-bar: 72px;
    --fd: 'Playfair Display', Georgia, serif;
    --fb: 'DM Sans', 'Segoe UI', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--fb); overflow: hidden; }
  input, select, textarea, button { font-family: inherit; }

  /* ── LAYOUT ── */
  #app { height: 100vh; display: flex; flex-direction: column; }
  .topbar { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); color: #fff; padding: 16px 20px 12px; padding-top: max(16px, env(safe-area-inset-top)); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-logo { font-family: var(--fd); font-size: 20px; font-weight: 700; }
  .topbar-sub { font-size: 11px; opacity: .75; margin-top: 1px; }

  .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: var(--bottom-bar); -webkit-overflow-scrolling: touch; }
  .page { padding: 16px; display: none; }
  .page.active { display: block; }

  /* ── BOTTOM NAV ── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-bar); background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(5, 1fr); padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
  .bnav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text-muted); transition: color .15s; padding: 8px 4px; }
  .bnav-item.active { color: var(--accent); }
  .bnav-item .bi { font-size: 22px; }
  .bnav-item .bl { font-size: 10px; font-weight: 600; }

  /* ── CARDS ── */
  .card { background: var(--card); border-radius: 16px; padding: 16px; border: 1.5px solid var(--border); margin-bottom: 10px; }

  /* ── DATE STRIP ── */
  .date-strip { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px; margin-bottom: 16px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .date-strip::-webkit-scrollbar { display: none; }
  .date-chip { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; transition: all .2s; min-width: 52px; flex-shrink: 0; }
  .date-chip.today { border-color: var(--accent); background: var(--accent-light); }
  .date-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .date-chip .dc-day { font-size: 10px; font-weight: 600; text-transform: uppercase; opacity: .7; }
  .date-chip .dc-num { font-family: var(--fd); font-size: 20px; font-weight: 700; }
  .date-chip .dc-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .date-chip.selected .dc-dot { background: rgba(255,255,255,.6); }

  /* ── APPOINTMENT ITEMS ── */
  .appt-item { display: flex; gap: 12px; padding: 14px 16px; }
  .appt-item + .appt-item { border-top: 1px solid var(--border); }
  .appt-item.completed { opacity: .65; }
  .ai-time { text-align: center; width: 44px; flex-shrink: 0; }
  .ai-time .t { font-family: var(--fd); font-size: 18px; font-weight: 700; color: var(--accent); }
  .ai-time .d { font-size: 10px; color: var(--text-muted); }
  .ai-body { flex: 1; min-width: 0; }
  .ai-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ai-svcs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .ai-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  /* ── BUTTONS ── */
  .btn { padding: 9px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; }
  .btn.sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.secondary { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn.success { background: var(--success); color: #fff; }
  .btn.ghost { background: transparent; color: var(--text-muted); }
  .btn.full { width: 100%; justify-content: center; }

  /* ── FAB ── */
  .fab { position: fixed; right: 20px; bottom: calc(var(--bottom-bar) + 16px); width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(196,86,140,.35); z-index: 99; transition: transform .2s; }
  .fab:active { transform: scale(.93); }

  /* ── STAT PILLS ── */
  .stat-pills { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-pill { background: var(--card); border-radius: 14px; padding: 14px 16px; border: 1.5px solid var(--border); }
  .sp-icon { font-size: 22px; margin-bottom: 4px; }
  .sp-val { font-family: var(--fd); font-size: 22px; font-weight: 700; color: var(--accent); }
  .sp-lbl { font-size: 11px; color: var(--text-muted); }

  /* ── CLIENT ITEMS ── */
  .client-item { display: flex; align-items: center; gap: 12px; padding: 12px; }
  .client-item + .client-item { border-top: 1px solid var(--border); }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--fd); font-weight: 700; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .ci-name { font-size: 15px; font-weight: 700; }
  .ci-sub { font-size: 12px; color: var(--text-muted); }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); background: var(--bg); outline: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: none; min-height: 70px; }

  /* ── SVC CHIPS ── */
  .svc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .svc-chip { padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; background: transparent; color: var(--text); cursor: pointer; }
  .svc-chip.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }

  /* ── PAYMENT GRID ── */
  .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .payment-btn { padding: 16px 10px; border-radius: 14px; border: 2px solid var(--border); background: var(--card); cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all .15s; }
  .payment-btn.selected { border-color: var(--accent); background: var(--accent-light); }
  .payment-btn .pi { font-size: 26px; }
  .payment-btn .pl { font-size: 13px; font-weight: 700; }
  .payment-btn .ps { font-size: 10px; color: var(--text-muted); }

  /* ── SHEET (bottom drawer) ── */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: flex-end; }
  .sheet { background: var(--bg); border-radius: 24px 24px 0 0; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideSheet .25s ease; }
  @keyframes slideSheet { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .sheet-title { font-family: var(--fd); font-size: 20px; font-weight: 700; margin-bottom: 16px; }

  /* ── CLIENT DETAIL ── */
  .client-detail { display: none; }
  .client-detail.active { display: block; }
  .svc-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .svc-bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .svc-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }

  /* ── MAGAZZINO MOBILE ── */
  .mag-row { display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border); }
  .mag-row:last-child { border-bottom:none; }
  .mag-row .mr-info { flex:1;min-width:0; }
  .mag-row .mr-name { font-size:14px;font-weight:700; }
  .mag-row .mr-sub  { font-size:11px;color:var(--text-muted); }
  .mq-ctrl { display:inline-flex;align-items:center;gap:8px; }
  .mq-btn { width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text); }
  .mq-btn:active { background:var(--accent-light);border-color:var(--accent); }
  .mq-num { font-family:var(--fd);font-size:20px;font-weight:700;min-width:28px;text-align:center; }
  .mag-alert { background:#BF7B7B12;border:1.5px solid #BF7B7B40;border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--danger); }
  .sec-title { font-family: var(--fd); font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty .ei { font-size: 36px; margin-bottom: 10px; }
  .note-box { padding: 10px 14px; background: var(--accent-light); border-radius: 10px; font-size: 13px; color: var(--accent-dark); line-height: 1.5; margin-top: 8px; }
  .summary-bar { padding: 10px 14px; background: var(--accent-light); border-radius: 10px; font-size: 13px; color: var(--accent-dark); margin-bottom: 12px; display: flex; justify-content: space-between; }
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 1000; white-space: nowrap; animation: fadeIn .3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* ── PWA: Connection indicator ── */
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
  .conn-dot.online { background: #7BA59F; box-shadow: 0 0 6px #7BA59F88; animation: pulse-dot 2s infinite; }
  .conn-dot.offline { background: #BF7B7B; }
  .conn-dot.syncing { background: #D4A574; animation: pulse-dot .6s infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .conn-label { font-size: 10px; opacity: .8; display: flex; align-items: center; }

  /* ── PWA: Better touch targets ── */
  .btn:active, .bnav-item:active, .date-chip:active, .client-item:active, .appt-item:active {
    transform: scale(.97); opacity: .85; transition: all .08s;
  }
  .fab:active { transform: scale(.88); }

  /* ── PWA: Install banner ── */
  .install-banner { padding: 12px 16px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); color: #fff; border-radius: 14px; margin-bottom: 12px; display: none; align-items: center; gap: 12px; cursor: pointer; }
  .install-banner .ib-icon { font-size: 28px; flex-shrink: 0; }
  .install-banner .ib-text { font-size: 13px; font-weight: 600; flex: 1; }
  .install-banner .ib-btn { padding: 6px 14px; background: #fff; color: var(--accent-dark); border-radius: 20px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; flex-shrink: 0; }

  /* ── PWA: Saved indicator ── */
  .save-indicator { position: fixed; top: 8px; right: 8px; font-size: 11px; color: #fff; opacity: 0; transition: opacity .3s; z-index: 200; background: rgba(0,0,0,.3); padding: 3px 10px; border-radius: 20px; pointer-events: none; }
  .save-indicator.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div id="topbarLeft" style="display:flex;align-items:center;gap:10px">
      <span style="font-family:var(--fd);font-size:18px;font-weight:700;color:#fff;letter-spacing:1px">✂️ SEI UNICA</span>
      <div class="topbar-sub" id="topbarSub">Gestione Appuntamenti</div>
      <span class="conn-label" id="connLabel" style="margin-left:8px"><span class="conn-dot online" id="connDot"></span>Locale</span>
    </div>
    <button class="btn sm" id="topbarBtn" style="background:rgba(255,255,255,.2);color:#fff;border:none" onclick="topbarAction()">+ Nuovo</button>
  </div>

  <!-- SAVE INDICATOR -->
  <div class="save-indicator" id="saveInd">💾 Salvato</div>

  <!-- CONTENT -->
  <div class="content">
    <!-- OGGI -->
    <div class="page active" id="page-oggi">
      <!-- INSTALL BANNER -->
      <div class="install-banner" id="installBanner" onclick="installApp()">
        <span class="ib-icon">📲</span>
        <span class="ib-text">Installa l'app sul telefono per accedere rapidamente</span>
        <button class="ib-btn">Installa</button>
      </div>
      <div style="position:relative;margin-bottom:10px">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4">🔍</span>
        <input id="calSearch" type="search" placeholder="Cerca cliente..." oninput="renderApptList()" style="padding:10px 14px 10px 36px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);width:100%;font-size:14px;outline:none">
      </div>
      <div id="dateStripWrap"></div>
      <div id="apptList"></div>
    </div>

    <!-- CLIENTI -->
    <div class="page" id="page-clienti">
      <!-- client list OR detail -->
      <div id="clientiListView">
        <div class="sec-title" style="margin-bottom:12px">👥 Clienti</div>
        <div style="position:relative;margin-bottom:14px">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4">🔍</span>
          <input id="mobileSearch" type="search" placeholder="Cerca..." style="padding:11px 14px 11px 36px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);width:100%;font-size:15px;outline:none">
        </div>
        <div class="card" style="padding:0" id="clientiCardList"></div>
      </div>
      <div class="client-detail" id="clientDetailView">
        <button class="btn ghost sm" onclick="closeClientDetail()" style="margin-bottom:14px">← Indietro</button>
        <div id="clientDetailContent"></div>
      </div>
    </div>

    <!-- LISTINO -->
    <div class="page" id="page-listino">
      <div class="sec-title">💈 Listino Servizi</div>
      <div id="listinoContent"></div>
    </div>

    <!-- MAGAZZINO -->
    <div class="page" id="page-magazzino">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="sec-title" style="margin:0">📦 Magazzino</div>
        <button class="btn sm primary" onclick="openNewProdSheet()">+ Prodotto</button>
      </div>
      <div id="magContent"></div>
    </div>

    <!-- STATISTICHE -->
    <div class="page" id="page-stat">
      <div class="sec-title">📊 Statistiche</div>
      <div id="statContent"></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" onclick="openNewApptSheet()">+</button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bnav-item active" data-page="oggi" onclick="switchPage('oggi',this)"><span class="bi">📅</span><span class="bl">Oggi</span></button>
    <button class="bnav-item" data-page="clienti" onclick="switchPage('clienti',this)"><span class="bi">👥</span><span class="bl">Clienti</span></button>
    <button class="bnav-item" data-page="listino" onclick="switchPage('listino',this)"><span class="bi">💈</span><span class="bl">Listino</span></button>
    <button class="bnav-item" data-page="magazzino" onclick="switchPage('magazzino',this)"><span class="bi" style="position:relative">📦<span id="magBadge" style="display:none;position:absolute;top:-4px;right:-8px;background:var(--danger);color:#fff;font-size:9px;padding:1px 4px;border-radius:8px;font-weight:700"></span></span><span class="bl">Magazzino</span></button>
    <button class="bnav-item" data-page="stat" onclick="switchPage('stat',this)"><span class="bi">📊</span><span class="bl">Stat</span></button>
  </nav>
</div>

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="sheetOverlay" style="display:none" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<script>
// ===== CONSTANTS =====
const AVATAR_COLORS = ["#D4A574","#C48B9F","#7BA59F","#9B8EC4","#C4956A","#6B9FBF","#B5876B","#8FAF7E","#BF7B7B","#7BBFA5"];
const METODI = [
  {id:"contanti",icon:"💵",label:"Contanti",sub:"Cash"},
  {id:"carta",icon:"💳",label:"Carta",sub:"POS / contactless"},
  {id:"bonus",icon:"🎁",label:"Buono",sub:"Gift card"},
  {id:"omaggio",icon:"🌸",label:"Omaggio",sub:"Gratuito"},
];
const METODI_PREF = [
  {id:"contanti", icon:"💵", label:"Contanti"},
  {id:"bancomat", icon:"💳", label:"Bancomat"},
  {id:"satispay", icon:"📲", label:"Satispay"},
];
const prefInfo = m => METODI_PREF.find(x=>x.id===m)||null;
const SERVICES = [
  {id:1,name:"Taglio donna",price:25,duration:45,emoji:"✂️"},
  {id:2,name:"Taglio uomo",price:18,duration:30,emoji:"✂️"},
  {id:3,name:"Piega",price:20,duration:40,emoji:"💇‍♀️"},
  {id:4,name:"Colore radici",price:35,duration:60,emoji:"🎨"},
  {id:5,name:"Colore completo",price:55,duration:90,emoji:"🎨"},
  {id:6,name:"Meches / Balayage",price:70,duration:120,emoji:"✨"},
  {id:7,name:"Trattamento cheratina",price:80,duration:90,emoji:"💎"},
  {id:8,name:"Permanente",price:50,duration:120,emoji:"🌀"},
  {id:9,name:"Shampoo + Piega",price:15,duration:30,emoji:"🧴"},
  {id:10,name:"Taglio bambino",price:12,duration:20,emoji:"👶"},
  {id:11,name:"Acconciatura sposa",price:120,duration:180,emoji:"👰"},
  {id:12,name:"Extension",price:150,duration:180,emoji:"💫"},
];

// ===== HELPERS =====
const today = new Date();
const fmtDate = d => d.toISOString().split("T")[0];
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const parseDate = s => { const[y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const fmtDateIT = s => parseDate(s).toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"long"});
const getInitials = (n,c) => ((n?.[0]||"")+(c?.[0]||"")).toUpperCase();
const getSvc = id => SERVICES.find(s=>s.id===id);
const payInfo = m => METODI.find(x=>x.id===m)||METODI[0];
let _uid = 100;
const uid = () => ++_uid;

function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2800);
}
function avatarHTML(n,c,id,size,foto){
  if(foto) return `<div class="avatar" style="width:${size}px;height:${size}px"><img src="${foto}"></div>`;
  const col=AVATAR_COLORS[(id||0)%AVATAR_COLORS.length];
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${col};font-size:${size*.38}px">${getInitials(n,c)}</div>`;
}
function badge(t,c){ return `<span class="badge" style="background:${(c||"var(--accent)")}18;color:${c||"var(--accent)"}">${t}</span>`; }

// ===== STATE =====
let state = {
  clienti: [],
  appuntamenti: [],
  magazzino: [],
  selectedDate: fmtDate(today),
  currentPage: "oggi",
  selectedPayAppt: null,
  selectedPayMethod: "contanti",
  selectedApptServices: [],
  preselectedClient: null,
};

let currentTopbarAction = null;
function switchPage(page, btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  document.querySelectorAll(".bnav-item").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  state.currentPage=page;
  // Reset client detail
  if(page!=="clienti") closeClientDetail();

  // Topbar
  const fab=document.getElementById("fabBtn");
  const topBtn=document.getElementById("topbarBtn");
  if(page==="oggi"){ fab.style.display="flex"; topBtn.style.display="flex"; document.getElementById("topbarSub").textContent="Gestione Appuntamenti"; currentTopbarAction=openNewApptSheet; }
  else if(page==="clienti"){ fab.style.display="flex"; topBtn.style.display="flex"; document.getElementById("topbarSub").textContent="Clienti"; currentTopbarAction=openNewClientSheet; }
  else if(page==="magazzino"){ fab.style.display="flex"; topBtn.style.display="flex"; document.getElementById("topbarSub").textContent="Magazzino Prodotti"; currentTopbarAction=openNewProdSheet; }
  else { fab.style.display="none"; topBtn.style.display="none"; }

  if(page==="clienti") renderClientiList();
  if(page==="listino") renderListino();
  if(page==="magazzino") renderMagazzino();
  if(page==="stat") renderStat();
}
function topbarAction(){ if(currentTopbarAction) currentTopbarAction(); }

// ===== DATE STRIP =====
function renderDateStrip(){
  const days=[];
  for(let i=-1;i<13;i++) days.push(fmtDate(addDays(today,i)));
  const strip=document.getElementById("dateStripWrap");
  strip.innerHTML=`<div class="date-strip">${days.map(d=>{
    const dd=parseDate(d);
    const isT=d===fmtDate(today), isSel=d===state.selectedDate;
    const cnt=state.appuntamenti.filter(a=>a.data===d).length;
    return `<div class="date-chip ${isT&&!isSel?'today':''} ${isSel?'selected':''}" onclick="selectDate('${d}')">
      <div class="dc-day">${dd.toLocaleDateString("it-IT",{weekday:"short"})}</div>
      <div class="dc-num">${dd.getDate()}</div>
      ${cnt>0?`<div class="dc-dot"></div>`:""}
    </div>`;
  }).join("")}</div>`;
  // Scroll today into view
  setTimeout(()=>{
    const sel=strip.querySelector(".selected,.today");
    if(sel) sel.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  },50);
}
window.selectDate=function(d){
  state.selectedDate=d; renderDateStrip(); renderApptList();
};

// ===== APPT LIST =====
function renderApptList(){
  const calQ=(document.getElementById("calSearch")?.value||"").toLowerCase();
  const appts=state.appuntamenti.filter(a=>{
    if(a.data!==state.selectedDate) return false;
    if(!calQ) return true;
    const cl=getClient(a.clienteId);
    return cl && (cl.nome+" "+cl.cognome+" "+(cl.soprannome||"")).toLowerCase().includes(calQ);
  }).sort((a,b)=>a.ora.localeCompare(b.ora));
  const el=document.getElementById("apptList");
  const label=state.selectedDate===fmtDate(today)?"Oggi":fmtDateIT(state.selectedDate);
  const incasso=state.appuntamenti.filter(a=>a.data===state.selectedDate&&a.completato).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec-title" style="margin:0">${label}</div>
      ${incasso>0?`<span style="font-family:var(--fd);font-size:18px;font-weight:700;color:var(--success)">€${incasso} ✓</span>`:""}
    </div>
    ${appts.length===0
      ?`<div class="empty"><div class="ei">📭</div><p>Nessun appuntamento</p></div>`
      :`<div class="card" style="padding:0">
        ${appts.map(a=>{
          const cl=getClient(a.clienteId); if(!cl)return"";
          const tp=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0);
          const tm=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.duration||0),0);
          const pi=a.metodo?payInfo(a.metodo):null;
          return `<div class="appt-item ${a.completato?'completed':''}">
            <div class="ai-time"><div class="t">${a.ora}</div><div class="d">${tm}m</div></div>
            <div class="ai-body">
              <div class="ai-name">${cl.nome} ${cl.cognome}${cl.soprannome?` <span style="font-weight:400;font-size:12px;color:var(--text-muted)">"${cl.soprannome}"</span>`:""}</div>
              <div class="ai-svcs">
                ${a.servizi.map(sid=>{const sv=getSvc(sid);return sv?badge(sv.emoji+" "+sv.name):""}).join("")}
                ${badge("€"+tp,"var(--success)")}
                ${pi?badge(pi.icon,"var(--purple)"):""}
              </div>
              ${a.note?`<div style="font-size:11px;color:var(--text-muted);font-style:italic">📝 ${a.note}</div>`:""}
            </div>
            <div class="ai-actions">
              ${a.completato
                ?`<button class="btn sm success" onclick="untoggleAppt(${a.id})" style="font-size:11px">✓</button>`
                :`<button class="btn sm primary" onclick="openPaySheet(${a.id})" style="font-size:11px">💰</button>`}
              <button class="btn sm ghost" onclick="deleteAppt(${a.id})" style="font-size:18px;padding:2px 6px">🗑️</button>
            </div>
          </div>`;
        }).join("")}
      </div>`}`;
}

    <div class="payment-grid" id="payGrid">
      ${METODI.map(m=>`<button class="payment-btn ${m.id===state.selectedPayMethod?'selected':''}" onclick="selectPayMethod('${m.id}')">

      </button>`).join("")}
    </div>

  `);
};
window.selectPayMethod=function(m){
  state.selectedPayMethod=m;
  document.querySelectorAll(".payment-btn").forEach(b=>b.classList.toggle("selected",b.querySelector(".pl")?.textContent===payInfo(m).label));
};
window.confirmPay=async function(){
  const appt=state.appuntamenti.find(a=>a.id===state.selectedPayAppt);
  closeSheet();
  if(apiBase && appt){
    await apiPost("/appuntamenti/"+appt.id+"/toggle",{metodo_pagamento:state.selectedPayMethod});
    await syncFromServer();
  } else if(appt){
    appt.completato=true; appt.metodo=state.selectedPayMethod; saveState();
  }
  renderDateStrip(); renderApptList();
  toast("✅ Incassato con "+payInfo(state.selectedPayMethod).label+"!");
};
window.untoggleAppt=async function(id){
  if(confirm("Annullare l'incasso?")){
    if(apiBase){
      await apiPost("/appuntamenti/"+id+"/toggle",{});
      await syncFromServer();
    } else {
      const a=state.appuntamenti.find(x=>x.id===id);
      if(a){ a.completato=false; a.metodo=null; saveState(); }
    }
    renderDateStrip(); renderApptList(); toast("↩️ Incasso annullato");
  }
};
window.deleteAppt=async function(id){
  if(confirm("Eliminare l'appuntamento?")){
    if(apiBase){
      await apiDelete("/appuntamenti/"+id);
      await syncFromServer();
    } else {
      state.appuntamenti=state.appuntamenti.filter(a=>a.id!==id);
      saveState();
    }
    renderDateStrip(); renderApptList();
  }
};

window.saveNewAppt=async function(){
  const cid=document.getElementById("apptCli").value;
  const data=document.getElementById("apptData").value;
  const ora=document.getElementById("apptOra").value;
  const note=document.getElementById("apptNote").value;
  if(!cid||state.selectedApptServices.length===0){ toast("Seleziona cliente e servizi"); return; }
  closeSheet();
  if(apiBase){
    await apiPost("/appuntamenti",{cliente_id:Number(cid),data,ora,note,servizi:state.selectedApptServices});
    await syncFromServer();
  } else {
    state.appuntamenti.push({id:uid(),clienteId:Number(cid),data,ora,servizi:[...state.selectedApptServices],note,completato:false,metodo:null});
    saveState();
  }
  state.selectedDate=data;
  renderDateStrip(); renderApptList();
  toast("✅ Appuntamento prenotato!");
};

};

window.deleteClient=async function(id){
  const cl=getClient(id);
  if(!cl) return;
  if(!confirm(`Eliminare "${cl.nome} ${cl.cognome}" e tutti i suoi appuntamenti?`)) return;
  if(apiBase){
    await apiDelete("/clienti/"+id);
    await syncFromServer();
  } else {
    state.clienti=state.clienti.filter(c=>c.id!==id);
    state.appuntamenti=state.appuntamenti.filter(a=>a.clienteId!==id);
    saveState();
  }
  closeClientDetail();
  renderClientiList();
  toast("🗑️ Cliente eliminato");
};
window.closeClientDetail=function(){
  document.getElementById("clientiListView").style.display="block";

// ===== MAGAZZINO =====

  // Update bottom nav badge
  const lowCount=mag.filter(p=>p.qty<=2).length;
  const magBdg=document.getElementById("magBadge");
  if(magBdg){ magBdg.style.display=lowCount>0?"block":"none"; magBdg.textContent=lowCount; }
  const totVal = mag.reduce((t,p)=>t+(p.qty*p.costo),0);
  const totQty = mag.reduce((t,p)=>t+p.qty,0);
  const lowItems = mag.filter(p=>p.qty<=2);

  function stockColor(q){ return q===0?"var(--danger)":q<=2?"#B8893A":"var(--success)"; }
  function stockLabel(q){ return q===0?"⚠️ Esaurito":q<=2?"🟡 Quasi finito":"✅ OK"; }

  document.getElementById("magContent").innerHTML=`
    <div class="stat-pills" style="grid-template-columns:1fr 1fr 1fr">
      <div class="stat-pill"><div class="sp-icon">📦</div><div class="sp-val">${totQty}</div><div class="sp-lbl">Flaconi</div></div>
      <div class="stat-pill"><div class="sp-icon">💰</div><div class="sp-val">€${totVal.toFixed(0)}</div><div class="sp-lbl">Valore</div></div>
      <div class="stat-pill" style="${lowItems.length>0?'border-color:var(--warning)':''}">
        <div class="sp-icon">🔔</div>
        <div class="sp-val" style="font-size:16px;color:${mag.filter(p=>p.qty===0).length>0?'var(--danger)':lowItems.length>0?'#B8893A':'var(--success)'}">${lowItems.length===0?"OK":lowItems.length+" ⚠️"}</div>
        <div class="sp-lbl">Scorte</div>
      </div>
    </div>

    ${lowItems.length>0?`<div class="mag-alert">⚠️ Scorte basse: ${lowItems.map(p=>`${p.emoji} ${p.nome} (${p.qty})`).join(" · ")}</div>`:""}

    <div class="card" style="padding:0;overflow:hidden">
      ${mag.map(p=>`
        <div class="mag-row">
          <span style="font-size:26px;flex-shrink:0">${p.emoji}</span>
          <div class="mr-info">
            <div class="mr-name">${p.nome}</div>
            <div class="mr-sub">${p.fornitore||""}${p.note?" · "+p.note:""}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
              <span style="font-size:11px;font-weight:700;color:${stockColor(p.qty)}">${stockLabel(p.qty)}</span>
              <span style="font-size:11px;color:var(--text-muted)">€${p.costo.toFixed(2)}/fl. · Tot: <strong style="color:var(--accent)">€${(p.qty*p.costo).toFixed(2)}</strong></span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
            <div class="mq-ctrl">
              <button class="mq-btn" onclick="magQty(${p.id},-1)" ${p.qty===0?"disabled style='opacity:.3'":""}>−</button>
              <span class="mq-num">${p.qty}</span>
              <button class="mq-btn" onclick="magQty(${p.id},+1)">+</button>
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn xs secondary" onclick="openEditProdSheet(${p.id})" style="padding:3px 8px;font-size:11px">✏️</button>
              <button class="btn xs ghost" onclick="deleteProd(${p.id})" style="padding:3px 8px;font-size:11px;color:var(--danger)">🗑️</button>
            </div>
          </div>
        </div>`).join("")}
    </div>
  `;
}

window.magQty = async function(id, delta){
  const p = state.magazzino.find(x=>x.id===id);
  if(!p) return;
  if(apiBase){
    await apiPost("/magazzino/"+id+"/qty", {delta});
    await syncFromServer();
  } else {
    p.qty = Math.max(0, p.qty + delta);
    saveState();
  }
  renderMagazzino();
  const updated = state.magazzino.find(x=>x.id===id);
  toast(`${updated?.emoji||p.emoji} ${updated?.nome||p.nome}: ${updated?.qty??p.qty} flaconi`);
};

window.deleteProd = async function(id){
  const p = state.magazzino.find(x=>x.id===id);
  if(p && confirm(`Eliminare "${p.nome}"?`)){
    if(apiBase){
      await apiDelete("/magazzino/"+id);
      await syncFromServer();
    } else {
      state.magazzino = state.magazzino.filter(x=>x.id!==id);
      saveState();
    }
    renderMagazzino(); toast("🗑️ Prodotto eliminato");
  }
};

window.pickEmoji = function(e, btn){
  document.getElementById("pEmoji").value = e;
  document.querySelectorAll(".sheet [onclick^='pickEmoji']").forEach(b=>{
    b.style.borderColor="var(--border)"; b.style.background="var(--card)";

window.saveProd = async function(){
  const nome = document.getElementById("pNome").value.trim();
  if(!nome){ toast("Inserisci il nome del prodotto"); return; }
  const data = {
    emoji: document.getElementById("pEmoji").value || "📦",
    nome,
    qty: parseInt(document.getElementById("pQty").value)||0,
    costo: parseFloat(document.getElementById("pCosto").value)||0,
    fornitore: document.getElementById("pForn").value,
    note: document.getElementById("pNote").value,
  };
  closeSheet();
  if(apiBase){
    if(_editProdId) await apiPut("/magazzino/"+_editProdId, data);
    else await apiPost("/magazzino", data);
    await syncFromServer();
  } else {
    if(_editProdId){
      const p = state.magazzino.find(x=>x.id===_editProdId);
      if(p) Object.assign(p, data);
    } else {
      state.magazzino.push({...data, id:uid()});
    }
    saveState();
  }
  toast(_editProdId?"✅ Prodotto aggiornato!":"✅ Prodotto aggiunto!");
  }
  closeSheet(); renderMagazzino();
};

// ===== STATISTICHE =====
function renderStat(){
  const oggi=fmtDate(today);
  const inizio_mese=fmtDate(new Date(today.getFullYear(),today.getMonth(),1));
  const passati=state.appuntamenti.filter(a=>a.completato);
  const incOggi=passati.filter(a=>a.data===oggi).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);
  const incMese=passati.filter(a=>a.data>=inizio_mese).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);

  // Pagamenti mese
  const payMese={};
  passati.filter(a=>a.data>=inizio_mese).forEach(a=>{
    const m=a.metodo||"contanti";
    if(!payMese[m]) payMese[m]={cnt:0,tot:0};
    payMese[m].cnt++; payMese[m].tot+=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0);
  });

  // Servizi top mese
  const svcMese={};
  passati.filter(a=>a.data>=inizio_mese).forEach(a=>a.servizi.forEach(sid=>{
    const sv=getSvc(sid); if(!sv)return;
    if(!svcMese[sid]) svcMese[sid]={nome:sv.name,emoji:sv.emoji,cnt:0};
    svcMese[sid].cnt++;
  }));
  const topSvc=Object.values(svcMese).sort((a,b)=>b.cnt-a.cnt).slice(0,5);

  document.getElementById("statContent").innerHTML=`
    <button class="btn full" onclick="exportData()" style="margin-bottom:16px;background:var(--card);border:1.5px solid var(--border)">📥 Scarica Backup Dati</button>
    <div class="stat-pills">
      <div class="stat-pill"><div class="sp-icon">💰</div><div class="sp-val">€${incOggi}</div><div class="sp-lbl">Oggi</div></div>
      <div class="stat-pill"><div class="sp-icon">📆</div><div class="sp-val">€${incMese}</div><div class="sp-lbl">Questo mese</div></div>
      <div class="stat-pill"><div class="sp-icon">👥</div><div class="sp-val">${state.clienti.length}</div><div class="sp-lbl">Clienti</div></div>
      <div class="stat-pill"><div class="sp-icon">✂️</div><div class="sp-val">${state.appuntamenti.filter(a=>a.data===oggi).length}</div><div class="sp-lbl">App. oggi</div></div>
    </div>

    ${topSvc.length>0?`<div class="card" style="margin-bottom:12px">
      <div style="font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:12px">🏆 Servizi top (mese)</div>
      ${topSvc.map((sv,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px">
        <span style="font-family:var(--fd);font-weight:700;color:var(--accent);width:20px">${i+1}</span>
        <span style="font-size:18px">${sv.emoji}</span>
        <span style="flex:1">${sv.nome}</span>
        <span style="font-weight:700">${sv.cnt}x</span>
      </div>`).join("")}
    </div>`:""}

    ${Object.keys(payMese).length>0?`<div class="card">
      <div style="font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:12px">💳 Pagamenti (mese)</div>
      ${Object.entries(payMese).sort((a,b)=>b[1].tot-a[1].tot).map(([m,d])=>{
        const pi=payInfo(m);
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:10px;margin-bottom:8px">
          <span style="font-size:20px">${pi.icon}</span>
          <span style="flex:1;font-weight:600;font-size:14px">${pi.label}</span>
          <span style="font-size:12px;color:var(--text-muted)">${d.cnt} app.</span>
          <span style="font-family:var(--fd);font-weight:700;color:var(--accent)">€${d.tot}</span>
        </div>`;
      }).join("")}
    </div>`:""}
  `;
}

  };

  a.download = "sei_unica_backup_" + fmtDate(today) + ".json";

};

// ===== PERSISTENCE: localStorage =====
const STORAGE_KEY = "sei_unica_state_v5";

function saveState(){
  try {
    const toSave = { clienti: state.clienti, appuntamenti: state.appuntamenti, magazzino: state.magazzino };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    showSaveIndicator();
  } catch(e){ console.warn("Salvataggio locale fallito:", e); }
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const saved = JSON.parse(raw);
    if(saved.clienti) state.clienti = saved.clienti;
    if(saved.appuntamenti) state.appuntamenti = saved.appuntamenti;
    if(saved.magazzino) state.magazzino = saved.magazzino;
    return true;
  } catch(e){ console.warn("Caricamento locale fallito:", e); return false; }
}

function showSaveIndicator(){
  const el = document.getElementById("saveInd");
  if(!el) return;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(()=> el.classList.remove("show"), 1200);
}

// Auto-save on data changes
function autoSaveWrap(){
  clearTimeout(autoSaveWrap._t);
  autoSaveWrap._t = setTimeout(saveState, 500);
}

// Load saved data on startup
if(loadState()){
  renderDateStrip();
  renderApptList();
}

// ===== CONNECTION STATUS =====
let isOnline = navigator.onLine;
let apiBase = "";  // Will be set if backend detected

// API helpers
async function apiPost(path, data){
  if(!apiBase) return null;
  try {
    const r = await fetch(apiBase+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)});
    if(r.ok) return await r.json();
    console.warn("API POST error:", r.status);
  } catch(e){ console.warn("API POST failed:", e); }
  return null;
}
async function apiPut(path, data){
  if(!apiBase) return null;
  try {
    const r = await fetch(apiBase+path, {method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)});
    if(r.ok) return await r.json();
  } catch(e){ console.warn("API PUT failed:", e); }
  return null;
}
async function apiDelete(path){
  if(!apiBase) return null;
  try {
    const r = await fetch(apiBase+path, {method:"DELETE"});
    if(r.ok) return true;
  } catch(e){ console.warn("API DELETE failed:", e); }
  return null;
}

function updateConnectionUI(){
  const dot = document.getElementById("connDot");
  const label = document.getElementById("connLabel");
  if(!dot || !label) return;
  if(apiBase){
    dot.className = "conn-dot online";
    label.textContent = "Connesso";
  } else if(isOnline){
    dot.className = "conn-dot online";
    label.textContent = "Locale";
  } else {
    dot.className = "conn-dot offline";
    label.textContent = "Offline";
  }
}

async function checkBackend(){
  try {
    const ctrl = new AbortController();
    const tmr = setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch("/api/health", {signal: ctrl.signal});
    clearTimeout(tmr);
    if(r.ok){
      const d = await r.json();
      if(d.ok){ apiBase = "/api"; updateConnectionUI(); return true; }
    }
  } catch(e){}
  apiBase = "";
  updateConnectionUI();
  return false;
}

window.addEventListener("online", ()=>{ isOnline=true; checkBackend(); });
window.addEventListener("offline", ()=>{ isOnline=false; apiBase=""; updateConnectionUI(); });

// Check backend on load, then sync
checkBackend().then(ok => { if(ok) syncFromServer(); });

// ===== API SYNC (optional, when backend is available) =====
async function syncFromServer(){
  if(!apiBase) return;
  try {
    const [cRes, aRes, mRes] = await Promise.all([
      fetch(apiBase+"/clienti"), fetch(apiBase+"/appuntamenti"), fetch(apiBase+"/magazzino")
    ]);
    if(cRes.ok && aRes.ok && mRes.ok){
      const clienti = await cRes.json();
      const appuntamenti = await aRes.json();
      const magazzino = await mRes.json();

      // Map server format to local format
      state.clienti = clienti.map(c=>({
        id:c.id, nome:c.nome, cognome:c.cognome, soprannome:c.soprannome||"",
        telefono:c.telefono||"", email:c.email||"", note:c.note||"",
        foto:c.foto||null, creato:c.creato||"", metodoPref:c.metodo_pref||""
      }));
      state.appuntamenti = appuntamenti.map(a=>({
        id:a.id, clienteId:a.cliente_id, data:a.data, ora:a.ora,
        servizi: (a.servizi||[]).map(s=>s.id),
        note:a.note||"", completato:!!a.completato, metodo:a.metodo_pagamento||null
      }));
      state.magazzino = magazzino.map(m=>({
        id:m.id, emoji:m.emoji||"📦", nome:m.nome, qty:m.qty||0,
        costo:m.costo||0, fornitore:m.fornitore||"", note:m.note||""
      }));
      saveState();
      renderDateStrip(); renderApptList();
    }
  } catch(e){ console.warn("Sync fallita:", e); }
}
