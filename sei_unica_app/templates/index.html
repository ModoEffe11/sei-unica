<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✂️ Sei Unica — Salon Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FBF5F9; --card: #FFFFFF; --accent: #C4568C; --accent-dark: #9E3D6E;
    --accent-light: #F8E0ED; --text: #2E2233; --text-muted: #8A7585;
    --border: #E8D8E0; --border-light: #F2E8EE; --success: #7BA59F;
    --warning: #D4A574; --danger: #BF7B7B; --purple: #9B8EC4;
    --fd: 'Playfair Display', Georgia, serif;
    --fb: 'DM Sans', 'Segoe UI', sans-serif;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--fb); }
  input, select, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
  .sidebar { width: 280px; min-width: 280px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
  .main { flex: 1; overflow-y: auto; overflow-x: hidden; }

  /* ── SIDEBAR ── */
  .sidebar-logo { padding: 20px 20px 12px; border-bottom: 1px solid var(--border-light); }
  .sidebar-logo p { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .sidebar-nav { padding: 12px 12px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .15s; border: none; background: none; width: 100%; text-align: left; color: var(--text); }
  .nav-item:hover { background: var(--accent-light); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }
  .nav-item .icon { font-size: 18px; }
  .sidebar-search { padding: 8px 12px; position: relative; }
  .sidebar-search input { width: 100%; padding: 8px 12px 8px 32px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); outline: none; }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: .4; }
  .client-list { flex: 1; overflow-y: auto; padding: 4px 12px 12px; }
  .client-list-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; cursor: pointer; transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
  .client-list-item:hover, .client-list-item.active { background: var(--accent-light); }
  .client-list-item .name { font-size: 13px; font-weight: 600; }
  .client-list-item .nick { font-size: 11px; color: var(--text-muted); }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border-light); }

  /* ── AVATAR ── */
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--fd); font-weight: 700; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ── BUTTONS ── */
  .btn { padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn.sm { padding: 5px 12px; font-size: 12px; }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-dark); }
  .btn.secondary { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn.ghost { background: transparent; color: var(--text-muted); }
  .btn.success { background: var(--success); color: #fff; }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn.whatsapp { background: #25D366; color: #fff; }

  /* ── BADGE ── */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color .2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row { display: flex; gap: 12px; }
  .form-row > * { flex: 1; }

  /* ── CARDS ── */
  .card { background: var(--card); border-radius: 14px; padding: 20px; border: 1.5px solid var(--border); }
  .card-profile { border-radius: 18px; padding: 28px; display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }

  /* ── WEEK CALENDAR ── */
  .week-section { margin-bottom: 24px; }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .week-nav-title { font-family: var(--fd); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .week-info { font-family: var(--fb); font-size: 12px; font-weight: 400; color: var(--text-muted); }
  .week-nav-arrows { display: flex; gap: 6px; align-items: center; }
  .week-arrow { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .2s; color: var(--text); }
  .week-arrow:hover { border-color: var(--accent); background: var(--accent-light); }
  .week-today-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--accent); background: transparent; color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .week-today-btn:hover { background: var(--accent); color: #fff; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-day { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all .2s; min-height: 90px; display: flex; flex-direction: column; }
  .week-day:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(196,86,140,.12); }
  .week-day.today { background: var(--accent-light); border-color: var(--accent); }
  .week-day.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-day.past { opacity: .55; }
  .week-day.sunday { opacity: .4; }
  .week-day .wd-name { font-size: 11px; text-transform: uppercase; opacity: .7; font-weight: 600; }
  .week-day .wd-num { font-family: var(--fd); font-size: 26px; font-weight: 700; margin: 4px 0; }
  .week-day .wd-month { font-size: 10px; opacity: .6; }
  .week-day .wd-dots { display: flex; gap: 3px; justify-content: center; margin-top: auto; flex-wrap: wrap; }
  .week-day .wd-dot { width: 7px; height: 7px; border-radius: 50%; }
  .week-day.selected .wd-dot { background: rgba(255,255,255,.5); }
  .week-day:not(.selected) .wd-dot { background: var(--accent); }
  .week-day .wd-count { font-size: 10px; font-weight: 700; margin-top: auto; }
  .week-day.selected .wd-count { color: rgba(255,255,255,.85); }
  .week-day:not(.selected) .wd-count { color: var(--accent); }
  .week-grid.mini .week-day { min-height: 56px; padding: 6px 4px; border-radius: 10px; }
  .week-grid.mini .week-day .wd-num { font-size: 18px; margin: 2px 0; }
  .week-grid.mini .week-day .wd-name { font-size: 9px; }

  /* ── APPOINTMENT CARDS ── */
  .appt-card { display: flex; gap: 16px; align-items: flex-start; }
  .appt-card.completed { opacity: .72; }
  .appt-time { text-align: center; min-width: 52px; }
  .appt-time .time { font-family: var(--fd); font-size: 24px; font-weight: 700; color: var(--accent); }
  .appt-time .dur { font-size: 11px; color: var(--text-muted); }
  .appt-body { flex: 1; }
  .appt-client { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .appt-client .cname { font-size: 15px; font-weight: 600; cursor: pointer; }
  .appt-client .cname:hover { color: var(--accent); }
  .appt-services { display: flex; flex-wrap: wrap; gap: 6px; }
  .appt-note { font-size: 13px; color: var(--text-muted); font-style: italic; margin-top: 8px; }
  .appt-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 130px; text-align: center; padding: 16px 18px; }
  .stat-card .stat-icon { font-size: 24px; margin-bottom: 4px; }
  .stat-card .stat-value { font-family: var(--fd); font-size: 22px; font-weight: 700; }
  .stat-card .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── CLIENT STATS GRID ── */
  .client-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .mini-stat { background: var(--bg); border: 1.5px solid var(--border-light); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .mini-stat .ms-val { font-family: var(--fd); font-size: 20px; font-weight: 700; color: var(--accent); }
  .mini-stat .ms-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── SERVICE BAR ── */
  .svc-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .svc-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .svc-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .svc-bar-count { font-size: 11px; color: var(--text-muted); min-width: 26px; text-align: right; }

  /* ── PAYMENT GRID ── */
  .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .payment-btn { padding: 18px 12px; border-radius: 14px; border: 2px solid var(--border); background: var(--card); cursor: pointer; text-align: center; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .payment-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .payment-btn.selected { border-color: var(--accent); background: var(--accent-light); }
  .payment-btn .pay-icon { font-size: 28px; }
  .payment-btn .pay-label { font-size: 13px; font-weight: 700; }
  .payment-btn .pay-sub { font-size: 10px; color: var(--text-muted); }

  /* ── PAY ROW (statistiche) ── */
  .pay-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg); border-radius: 10px; border: 1.5px solid var(--border-light); margin-bottom: 8px; }

  /* ── SERVICE/CLIENT GRIDS ── */
  .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .service-card .emoji { font-size: 32px; margin-bottom: 8px; }
  .service-card .sname { font-family: var(--fd); font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .service-card .smeta { display: flex; justify-content: space-between; font-size: 13px; }
  .service-card .sprice { font-weight: 700; color: var(--accent); font-size: 18px; font-family: var(--fd); }
  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .client-card { display: flex; gap: 14px; align-items: center; cursor: pointer; transition: all .2s; }
  .client-card:hover { border-color: var(--accent); }

  /* ── CHIPS ── */
  .svc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .svc-chip { padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1.5px solid var(--border); font-size: 12px; transition: all .15s; background: transparent; color: var(--text); }
  .svc-chip:hover { border-color: var(--accent); }
  .svc-chip.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }

  /* ── MODALS ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(58,47,40,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg); border-radius: 20px; padding: 28px; max-height: 85vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(58,47,40,.18); }
  .modal.normal { width: 440px; }
  .modal.wide { width: 560px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { font-family: var(--fd); font-size: 22px; }
  .modal-close { cursor: pointer; font-size: 20px; color: var(--text-muted); padding: 4px 8px; background: none; border: none; }

  /* ── STATS CHART ── */
  .stats-chart { background: var(--card); border-radius: 14px; border: 1.5px solid var(--border); padding: 20px; margin-bottom: 20px; }
  .stats-chart h3 { font-family: var(--fd); font-size: 16px; margin-bottom: 14px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: var(--accent); border-radius: 4px 4px 0 0; width: 100%; min-height: 2px; }
  .bar-label { font-size: 9px; color: var(--text-muted); }
  .bar-value { font-size: 9px; font-weight: 600; color: var(--accent-dark); }
  .ranking-list { list-style: none; }
  .ranking-list li { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
  .ranking-list li:last-child { border: none; }
  .ranking-num { font-family: var(--fd); font-size: 16px; font-weight: 700; color: var(--accent); width: 24px; }

  /* ── MISC ── */
  .note-box { margin-top: 12px; padding: 10px 14px; background: var(--accent-light); border-radius: 10px; font-size: 13px; color: var(--accent-dark); line-height: 1.5; }
  .summary-bar { padding: 10px 14px; background: var(--accent-light); border-radius: 10px; font-size: 13px; color: var(--accent-dark); margin-bottom: 14px; display: flex; justify-content: space-between; }
  .empty-state { text-align: center; padding: 60px; border-radius: 16px; border: 1.5px dashed var(--border); background: var(--card); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { color: var(--text-muted); font-size: 15px; }
  .foto-upload { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .foto-upload .foto-btn { padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 13px; cursor: pointer; background: var(--card); }
  .foto-upload img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-family: var(--fd); font-size: 28px; font-weight: 700; }
  .page-header .subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .section-title { font-family: var(--fd); font-size: 18px; margin-bottom: 12px; }
  .content-area { padding: 28px; height: 100%; overflow-y: auto; }
  .history-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 14px 18px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 2000; animation: slideUp .3s; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ── MAGAZZINO ── */
  .mag-table { width: 100%; border-collapse: collapse; }
  .mag-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 14px; border-bottom: 2px solid var(--border); }
  .mag-table td { padding: 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; font-size: 14px; }
  .mag-table tr:last-child td { border-bottom: none; }
  .mag-table tr:hover td { background: var(--bg); }
  .stock-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .stock-ok  { background: #7BA59F18; color: #7BA59F; }
  .stock-low { background: #D4A57418; color: #B8893A; }
  .stock-out { background: #BF7B7B18; color: #BF7B7B; }
  .qty-ctrl { display: inline-flex; align-items: center; gap: 6px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: all .15s; color: var(--text); }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .qty-num { font-family: var(--fd); font-size: 18px; font-weight: 700; min-width: 32px; text-align: center; }
  .mag-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 24px; }
  .mag-sum-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 20px; text-align: center; }
  .mag-sum-val { font-family: var(--fd); font-size: 26px; font-weight: 700; color: var(--accent); }
  .mag-sum-lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  @media (max-width: 768px) {
    .sidebar { width: 60px; min-width: 60px; }
    .sidebar-logo p, .nav-item span:not(.icon), .sidebar-search, .client-list, .sidebar-footer { display: none; }
    .sidebar-logo { padding: 16px 10px; text-align: center; }
    .sidebar-nav { padding: 8px 6px; }
    .nav-item { justify-content: center; padding: 12px; }
    .card-profile { flex-direction: column; }
    .stats-row, .form-row { flex-direction: column; }
    .client-stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
// ===== CONSTANTS =====
const AVATAR_COLORS = ["#D4A574","#C48B9F","#7BA59F","#9B8EC4","#C4956A","#6B9FBF","#B5876B","#8FAF7E","#BF7B7B","#7BBFA5"];
const METODI = [
  {id:"contanti", icon:"💵", label:"Contanti",       sub:"Cash"},
  {id:"carta",    icon:"💳", label:"Carta/Bancomat",  sub:"POS / contactless"},
  {id:"bonus",    icon:"🎁", label:"Buono/Bonus",     sub:"Gift card o credito"},
  {id:"omaggio",  icon:"🌸", label:"Omaggio",         sub:"Servizio gratuito"},
];
const METODI_PREF = [
  {id:"",           icon:"",   label:"Non specificato"},
  {id:"contanti",   icon:"💵", label:"Contanti"},
  {id:"bancomat",   icon:"💳", label:"Bancomat"},
  {id:"satispay",   icon:"📲", label:"Satispay"},
];
const prefInfo = m => METODI_PREF.find(x=>x.id===m) || METODI_PREF[0];
const SERVICES = [
  {id:1,name:"Taglio donna",price:25,duration:45,emoji:"✂️"},
  {id:2,name:"Taglio uomo",price:18,duration:30,emoji:"✂️"},
  {id:3,name:"Piega",price:20,duration:40,emoji:"💇‍♀️"},
  {id:4,name:"Colore radici",price:35,duration:60,emoji:"🎨"},
  {id:5,name:"Colore completo",price:55,duration:90,emoji:"🎨"},
  {id:6,name:"Meches / Balayage",price:70,duration:120,emoji:"✨"},
  {id:7,name:"Trattamento cheratina",price:80,duration:90,emoji:"💎"},
  {id:8,name:"Permanente",price:50,duration:120,emoji:"🌀"},
  {id:9,name:"Shampoo + Piega",price:15,duration:30,emoji:"🧴"},
  {id:10,name:"Taglio bambino",price:12,duration:20,emoji:"👶"},
  {id:11,name:"Acconciatura sposa",price:120,duration:180,emoji:"👰"},
  {id:12,name:"Extension",price:150,duration:180,emoji:"💫"},
];

// ===== HELPERS =====
const today = new Date();
const fmtDate = d => d.toISOString().split("T")[0];
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const parseDate = s => { const[y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const fmtDateIT = s => { if(!s)return""; return parseDate(s).toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"}); };
const fmtWeekday = s => parseDate(s).toLocaleDateString("it-IT",{weekday:"long"});
const getInitials = (n,c) => ((n?.[0]||"")+(c?.[0]||"")).toUpperCase();
const payInfo = m => METODI.find(x=>x.id===m)||METODI[0];
const getSvc = id => SERVICES.find(s=>s.id===id);

let _uid = 100;
const uid = () => ++_uid;
const toast = msg => { const d=document.createElement("div"); d.className="toast"; d.textContent=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); };

// ===== STATE =====
let selectedServices = [];
let currentFoto = null;
let selectedPayment = "contanti";

function getClient(id){ return state.clienti.find(c=>c.id===id); }
function avatarHTML(nome,cognome,id,size,foto){
  if(foto) return `<div class="avatar" style="width:${size}px;height:${size}px"><img src="${foto}" alt=""></div>`;
  const col = AVATAR_COLORS[(id||0) % AVATAR_COLORS.length];
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${col};font-size:${size*.38}px">${getInitials(nome,cognome)}</div>`;
}
function badge(t,c){ return `<span class="badge" style="background:${(c||"var(--accent)")}18;color:${c||"var(--accent)"}">${t}</span>`; }

// ===== MAIN ROUTER =====
function renderMain(){
  if(state.view==="cliente"&&state.selectedClientId) return renderClienteDetail();
  if(state.view==="clienti") return renderClientiList();
  if(state.view==="listino") return renderListino();
  if(state.view==="statistiche") return renderStatistiche();
  if(state.view==="magazzino") return renderMagazzino();
  return renderCalendario();
}

// ===== CALENDARIO =====
function renderCalendario(){
  const dow=today.getDay(), mo=dow===0?-6:1-dow;
  const thisMonday=addDays(today,mo);
  const vm=addDays(thisMonday,state.weekOffset*7);
  const nm=addDays(vm,7);
  const bw=m=>{ const d=[]; for(let i=0;i<7;i++) d.push(fmtDate(addDays(m,i))); return d; };
  const vw=bw(vm), nw=bw(nm);
  const ws=parseDate(vw[0]),we=parseDate(vw[6]);
  const wl=`${ws.getDate()} ${ws.toLocaleDateString("it-IT",{month:"short"})} — ${we.getDate()} ${we.toLocaleDateString("it-IT",{month:"short",year:"numeric"})}`;
  const ns=parseDate(nw[0]),ne=parseDate(nw[6]);
  const nl=`${ns.getDate()} ${ns.toLocaleDateString("it-IT",{month:"short"})} — ${ne.getDate()} ${ne.toLocaleDateString("it-IT",{month:"short"})}`;
  const isNow=state.weekOffset===0;

  function wd(d,mini){
    const dd=parseDate(d),isT=d===fmtDate(today),isSel=d===state.selectedDate;
    const isPast=dd<new Date(today.getFullYear(),today.getMonth(),today.getDate())&&!isT;
    const cnt=state.appuntamenti.filter(a=>a.data===d).length;
    const cls=['week-day',isT&&!isSel?'today':'',isSel?'selected':'',isPast?'past':'',dd.getDay()===0&&!isSel?'sunday':''].filter(Boolean).join(' ');
    return `<div class="${cls}" data-day="${d}">
      <div class="wd-name">${dd.toLocaleDateString("it-IT",{weekday:"short"})}</div>
      <div class="wd-num">${dd.getDate()}</div>
      ${!mini?`<div class="wd-month">${dd.toLocaleDateString("it-IT",{month:"short"})}</div>`:""}
      ${cnt>0?`<div class="wd-dots">${Array(Math.min(cnt,5)).fill('<div class="wd-dot"></div>').join("")}</div><div class="wd-count">${cnt} app.</div>`:""}
    </div>`;
  }

  const appts=state.appuntamenti.filter(a=>a.data===state.selectedDate).sort((a,b)=>a.ora.localeCompare(b.ora));
  const wc=state.appuntamenti.filter(a=>vw.includes(a.data)).length;
  const nc=state.appuntamenti.filter(a=>nw.includes(a.data)).length;

  return `<div class="content-area">
    <div class="page-header">
      <div><h1>Calendario</h1><div class="subtitle">${fmtDateIT(state.selectedDate)} — ${fmtWeekday(state.selectedDate)}</div></div>
      <button class="btn primary" data-action="newAppt">+ Nuovo Appuntamento</button>
    </div>

    <div class="week-section">
      <div class="week-nav">
        <div class="week-nav-title">📅 ${isNow?"Questa settimana":wl}<span class="week-info">${wc} appuntament${wc===1?'o':'i'}</span></div>
        <div class="week-nav-arrows">
          ${!isNow?`<button class="week-today-btn" data-action="weekToday">Oggi</button>`:""}
          <button class="week-arrow" data-action="weekPrev">‹</button>
          <button class="week-arrow" data-action="weekNext">›</button>
        </div>
      </div>
      <div class="week-grid">${vw.map(d=>wd(d,false)).join("")}</div>
    </div>

    <div class="week-section">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:600;font-family:var(--fd)">
        📆 Settimana successiva — ${nl} <span style="font-weight:400;font-family:var(--fb);font-size:11px;opacity:.7">${nc} app.</span>
      </div>
      <div class="week-grid mini">${nw.map(d=>wd(d,true)).join("")}</div>
    </div>

    <div style="margin-top:8px">
      <div style="font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px">
        ${fmtWeekday(state.selectedDate)}
        <span style="font-weight:400;font-size:14px;color:var(--text-muted)">${fmtDateIT(state.selectedDate)}</span>
        <span style="font-size:13px;color:var(--accent);font-family:var(--fb)">${appts.length} appuntament${appts.length===1?'o':'i'}</span>
      </div>
      ${appts.length===0
        ?`<div class="empty-state"><div class="empty-icon">📭</div><p>Nessun appuntamento per questo giorno</p></div>`
        :appts.map(a=>{
          const cl=getClient(a.clienteId); if(!cl)return"";
          const tp=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0);
          const tm=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.duration||0),0);
          const pi=a.metodo?payInfo(a.metodo):null;
          return `<div class="card appt-card ${a.completato?'completed':''}" style="margin-bottom:12px;${a.completato?'border-color:#7BA59F60':''}">
            <div class="appt-time"><div class="time">${a.ora}</div><div class="dur">${tm} min</div></div>
            <div class="appt-body">
              <div class="appt-client">
                ${avatarHTML(cl.nome,cl.cognome,cl.id,34,cl.foto)}
                <div><span class="cname" data-client="${cl.id}">${cl.nome} ${cl.cognome}</span>${cl.soprannome?` <span style="font-size:12px;color:var(--text-muted)">"${cl.soprannome}"</span>`:""}</div>
              </div>
              <div class="appt-services">
                ${a.servizi.map(sid=>{const sv=getSvc(sid);return sv?badge(sv.emoji+" "+sv.name):""}).join("")}
                ${badge("€"+tp,"var(--success)")}
                ${pi?badge(pi.icon+" "+pi.label,"var(--purple)"):""}
              </div>
              ${a.note?`<div class="appt-note">📝 ${a.note}</div>`:""}
            </div>
            <div class="appt-actions">
              ${a.completato
                ?`<button class="btn sm success" data-untoggle="${a.id}" title="Annulla incasso">✓ Incassato</button>`
                :`<button class="btn sm secondary" data-pay-appt="${a.id}">💰 Incassa</button>`}
              <button class="btn sm ghost" data-delete-appt="${a.id}" style="color:var(--danger)">🗑️</button>
            </div>
          </div>`;
        }).join("")}
    </div>
  </div>`;
}

  const ultima=passati.length>0?fmtDateIT(passati[0].data):"—";

    <div class="client-stats-grid" style="margin-bottom:20px">

        .map(s=>`<div class="mini-stat"><div class="ms-val">${s.v}</div><div class="ms-lbl">${s.i} ${s.l}</div></div>`).join("")}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="card">
        <div style="font-family:var(--fd);font-size:15px;font-weight:700;margin-bottom:12px">✂️ Servizi preferiti</div>
        ${topSvc.length===0?`<p style="font-size:13px;color:var(--text-muted)">Nessun dato</p>`

      <div class="card">

// ===== STATISTICHE =====
function renderStatistiche(){
  // Calcola statistiche dai dati locali
  const oggi=fmtDate(today);
  const inizio_mese=fmtDate(new Date(today.getFullYear(),today.getMonth(),1));
  const inizio_settimana=fmtDate(addDays(today,-today.getDay()+1));
  const passati=state.appuntamenti.filter(a=>a.completato);

  const incOggi=passati.filter(a=>a.data===oggi).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);
  const incSett=passati.filter(a=>a.data>=inizio_settimana).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);
  const incMese=passati.filter(a=>a.data>=inizio_mese).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);

  // Ultimi 14 giorni
  const giorni=[];
  for(let i=13;i>=0;i--){
    const d=fmtDate(addDays(today,-i));
    const inc=passati.filter(a=>a.data===d).reduce((t,a)=>t+a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0),0);
    giorni.push({data:d,incasso:inc});
  }
  const maxI=Math.max(...giorni.map(g=>g.incasso),1);

  // Servizi top del mese
  const svcMese={};
  passati.filter(a=>a.data>=inizio_mese).forEach(a=>a.servizi.forEach(sid=>{
    const sv=getSvc(sid); if(!sv)return;
    if(!svcMese[sid]) svcMese[sid]={nome:sv.name,emoji:sv.emoji,cnt:0,inc:0};
    svcMese[sid].cnt++; svcMese[sid].inc+=(sv.price||0);
  }));
  const topSvc=Object.values(svcMese).sort((a,b)=>b.cnt-a.cnt).slice(0,5);

  // Clienti top del mese
  const cliMese={};
  passati.filter(a=>a.data>=inizio_mese).forEach(a=>{
    const cl=getClient(a.clienteId); if(!cl)return;
    if(!cliMese[a.clienteId]) cliMese[a.clienteId]={nome:cl.nome,cognome:cl.cognome,visite:0,speso:0};
    cliMese[a.clienteId].visite++;
    cliMese[a.clienteId].speso+=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0);
  });
  const topCli=Object.values(cliMese).sort((a,b)=>b.visite-a.visite).slice(0,5);

  // Pagamenti del mese
  const payMese={};
  passati.filter(a=>a.data>=inizio_mese).forEach(a=>{
    const m=a.metodo||"contanti";
    if(!payMese[m]) payMese[m]={cnt:0,tot:0};
    payMese[m].cnt++; payMese[m].tot+=a.servizi.reduce((s,sid)=>s+(getSvc(sid)?.price||0),0);
  });

  return `<div class="content-area">
    <div class="page-header"><h1>📊 Statistiche</h1></div>
    <div class="stats-row">
      ${[
        {l:"Incasso Oggi",v:"€"+incOggi,i:"💰"},
        {l:"Incasso Settimana",v:"€"+incSett,i:"📅"},
        {l:"Incasso Mese",v:"€"+incMese,i:"📆"},
        {l:"Clienti Totali",v:state.clienti.length,i:"👥"},
        {l:"App. Oggi",v:state.appuntamenti.filter(a=>a.data===oggi).length,i:"✂️"},
      ].map(x=>`<div class="card stat-card"><div class="stat-icon">${x.i}</div><div class="stat-value">${x.v}</div><div class="stat-label">${x.l}</div></div>`).join("")}
    </div>

    <div class="stats-chart">
      <h3>📈 Incassi ultimi 14 giorni</h3>
      <div class="bar-chart">
        ${giorni.map(g=>{
          const h=Math.max(2,(g.incasso/maxI)*100);
          const d=parseDate(g.data);
          return `<div class="bar-col">
            <div class="bar-value">${g.incasso>0?"€"+g.incasso:""}</div>
            <div class="bar" style="height:${h}%"></div>
            <div class="bar-label">${d.getDate()}/${d.getMonth()+1}</div>
          </div>`;
        }).join("")}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
      <div class="stats-chart">
        <h3>🏆 Servizi top (mese)</h3>
        <ul class="ranking-list">
          ${topSvc.length===0?`<li style="color:var(--text-muted)">Nessun dato</li>`
          :topSvc.map((sv,i)=>`<li><span class="ranking-num">${i+1}</span>${sv.emoji} ${sv.nome}<span style="margin-left:auto;font-weight:600">${sv.cnt}x — €${sv.inc}</span></li>`).join("")}
        </ul>
      </div>
      <div class="stats-chart">
        <h3>👑 Clienti top (mese)</h3>
        <ul class="ranking-list">
          ${topCli.length===0?`<li style="color:var(--text-muted)">Nessun dato</li>`
          :topCli.map((c,i)=>`<li><span class="ranking-num">${i+1}</span>${c.nome} ${c.cognome}<span style="margin-left:auto;font-weight:600">${c.visite}x — €${c.speso}</span></li>`).join("")}
        </ul>
      </div>
    </div>

    <div class="stats-chart">
      <h3>💳 Riepilogo Pagamenti (mese corrente)</h3>
      ${Object.keys(payMese).length===0
        ?`<p style="color:var(--text-muted);font-size:13px">Nessun incasso registrato questo mese.</p>`
        :Object.entries(payMese).sort((a,b)=>b[1].tot-a[1].tot).map(([m,d])=>{
          const pi=payInfo(m);
          return `<div class="pay-row">
            <span style="font-size:20px">${pi.icon}</span>
            <span style="flex:1;font-size:14px;font-weight:600">${pi.label}</span>
            <span style="font-size:12px;color:var(--text-muted)">${d.cnt} app.</span>
            <span style="font-family:var(--fd);font-size:17px;font-weight:700;color:var(--accent)">€${d.tot}</span>
          </div>`;
        }).join("")}
    </div>
  </div>`;
}

  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Inventario Magazzino — ${oggi}</title>

// ===== EVENTS =====
function bindEvents(){
  // Nav
  document.querySelectorAll("[data-nav]").forEach(el=>el.addEventListener("click",()=>{
    state.view=el.dataset.nav; state.selectedClientId=null; render();
  }));

  // Client select
  document.querySelectorAll("[data-client]").forEach(el=>el.addEventListener("click",()=>{
    state.selectedClientId=Number(el.dataset.client); state.view="cliente"; render();
  }));

  // Search
  const si=document.getElementById("searchInput");
  if(si) si.addEventListener("input",e=>{ state.search=e.target.value; render(); document.getElementById("searchInput")?.focus(); });

  // Logo rimosso (integrato nel codice)

  // Actions
  document.querySelectorAll("[data-action]").forEach(el=>el.addEventListener("click",()=>{
    const a=el.dataset.action;
    if(a==="newClient"){ state.modal={type:"newClient"}; currentFoto=null; render(); }
    else if(a==="editClient"){ const cl=getClient(state.selectedClientId); state.modal={type:"editClient",data:{...cl}}; currentFoto=cl.foto; render(); }
    else if(a==="newAppt"){ state.preselectedClientId=null; state.modal={type:"newAppt"}; selectedServices=[]; render(); }
    else if(a==="newApptFor"){ state.preselectedClientId=Number(el.dataset.cid); state.modal={type:"newAppt"}; selectedServices=[]; render(); }
    else if(a==="closeModal"){ state.modal=null; render(); }
    else if(a==="backToClienti"){ state.selectedClientId=null; state.view="clienti"; render(); }
    else if(a==="weekPrev"){ state.weekOffset--; render(); }
    else if(a==="weekNext"){ state.weekOffset++; render(); }
    else if(a==="weekToday"){ state.weekOffset=0; state.selectedDate=fmtDate(today); render(); }
    else if(a==="newProdotto"){ state.modal={type:"newProdotto"}; render(); }

  }));

  // Days
  document.querySelectorAll("[data-day]").forEach(el=>el.addEventListener("click",()=>{ state.selectedDate=el.dataset.day; render(); }));

  // Pulsante "Incassa" → apre modal pagamento
  document.querySelectorAll("[data-pay-appt]").forEach(el=>el.addEventListener("click",()=>{
    const appt=state.appuntamenti.find(a=>a.id===Number(el.dataset.payAppt));
    const cl=appt?getClient(appt.clienteId):null;
    // Pre-seleziona il metodo preferito del cliente (mappato al metodo appuntamento più vicino)
    if(cl&&cl.metodoPref){
      const mapPref={contanti:"contanti",bancomat:"carta",satispay:"carta"};
      selectedPayment=mapPref[cl.metodoPref]||"contanti";
    } else {
      selectedPayment="contanti";
    }
    state.modal={type:"payment",apptId:Number(el.dataset.payAppt)};
    render();
  }));

  // Selezione metodo pagamento
  document.querySelectorAll("[data-select-pay]").forEach(el=>el.addEventListener("click",()=>{
    selectedPayment=el.dataset.selectPay;
    document.querySelectorAll(".payment-btn").forEach(b=>b.classList.toggle("selected",b.dataset.selectPay===selectedPayment));
  }));

  // Conferma incasso
  const cpb=document.getElementById("confirmPayBtn");
  if(cpb) cpb.addEventListener("click",()=>{
    const appt=state.appuntamenti.find(a=>a.id===state.modal.apptId);
    if(appt){ appt.completato=true; appt.metodo=selectedPayment; }
    const pi=payInfo(selectedPayment);
    state.modal=null; render();
    toast("✅ Incassato con "+pi.label+"! "+pi.icon);
  });

  // Annulla incasso
  document.querySelectorAll("[data-untoggle]").forEach(el=>el.addEventListener("click",()=>{
    if(confirm("Annullare l'incasso di questo appuntamento?")){
      const appt=state.appuntamenti.find(a=>a.id===Number(el.dataset.untoggle));
      if(appt){ appt.completato=false; appt.metodo=null; }
      render(); toast("↩️ Incasso annullato");
    }
  }));

  // Elimina appuntamento
  document.querySelectorAll("[data-delete-appt]").forEach(el=>el.addEventListener("click",()=>{
    if(confirm("Eliminare questo appuntamento?")){
      state.appuntamenti=state.appuntamenti.filter(a=>a.id!==Number(el.dataset.deleteAppt));
      render();
    }
  }));

  // Magazzino — +/- quantità
  document.querySelectorAll("[data-qty-inc]").forEach(el=>el.addEventListener("click",()=>{
    const p=state.magazzino.find(x=>x.id===Number(el.dataset.qtyInc));
    if(p){ p.qty++; render(); toast(`${p.emoji} ${p.nome}: ${p.qty} flaconi`); }
  }));
  document.querySelectorAll("[data-qty-dec]").forEach(el=>el.addEventListener("click",()=>{
    const p=state.magazzino.find(x=>x.id===Number(el.dataset.qtyDec));
    if(p&&p.qty>0){ p.qty--; render(); toast(`${p.emoji} ${p.nome}: ${p.qty} flaconi`); }
  }));

  // Magazzino — modifica prodotto
  document.querySelectorAll("[data-edit-prod]").forEach(el=>el.addEventListener("click",()=>{
    const p=state.magazzino.find(x=>x.id===Number(el.dataset.editProd));
    if(p){ state.modal={type:"editProdotto",data:{...p}}; render(); }
  }));

  // Magazzino — elimina prodotto
  document.querySelectorAll("[data-del-prod]").forEach(el=>el.addEventListener("click",()=>{
    const p=state.magazzino.find(x=>x.id===Number(el.dataset.delProd));
    if(p&&confirm(`Eliminare "${p.nome}" dal magazzino?`)){ state.magazzino=state.magazzino.filter(x=>x.id!==p.id); render(); toast("🗑️ Prodotto eliminato"); }
  }));

  // Magazzino — form prodotto
  const pf=document.getElementById("prodottoForm");
  if(pf){
    // Emoji picker
    document.querySelectorAll("[data-emoji-pick]").forEach(btn=>btn.addEventListener("click",()=>{
      document.getElementById("emojiInput").value=btn.dataset.emojiPick;
      document.querySelectorAll("[data-emoji-pick]").forEach(b=>b.style.borderColor="");
      btn.style.borderColor="var(--accent)"; btn.style.background="var(--accent-light)";
    }));
    pf.addEventListener("submit",e=>{
      e.preventDefault();
      const fd=new FormData(pf);
      const data={
        emoji: fd.get("emoji")||"📦",
        nome: fd.get("nome"),
        qty: parseInt(fd.get("qty"))||0,
        costo: parseFloat(fd.get("costo"))||0,
        fornitore: fd.get("fornitore"),
        note: fd.get("note"),
      };
      if(state.modal.type==="editProdotto"){
        const p=state.magazzino.find(x=>x.id===state.modal.data.id);
        Object.assign(p,data); toast("✅ Prodotto aggiornato!");
      } else {
        state.magazzino.push({...data, id:uid()}); toast("✅ Prodotto aggiunto!");
      }
      state.modal=null; render();
    });
  }

  // Client form
  const cf=document.getElementById("clientForm");
  if(cf){
    // Radio button styling interactivo
    cf.querySelectorAll("input[name='metodoPref']").forEach(radio=>{
      radio.addEventListener("change",()=>{
        cf.querySelectorAll("input[name='metodoPref']").forEach(r=>{
          const lbl=r.closest("label");
          const sel=r.checked;
          lbl.style.borderColor=sel?"var(--accent)":"var(--border)";
          lbl.style.background=sel?"var(--accent-light)":"var(--card)";
          lbl.style.fontWeight=sel?"700":"400";
        });
      });
    });
    cf.addEventListener("submit",e=>{
      e.preventDefault();
      const fd=new FormData(cf);
      const data={nome:fd.get("nome"),cognome:fd.get("cognome"),soprannome:fd.get("soprannome"),telefono:fd.get("telefono"),email:fd.get("email"),note:fd.get("note"),foto:currentFoto,metodoPref:fd.get("metodoPref")||""};
      if(state.modal.type==="editClient"){
        const cl=getClient(state.selectedClientId);
        Object.assign(cl,data);
        toast("✅ Cliente aggiornato!");
      } else {
        const nc={...data,id:uid(),creato:fmtDate(today)};
        state.clienti.push(nc);
        state.selectedClientId=nc.id;
        state.view="cliente";
        toast("✅ Cliente creato!");
      }
      state.modal=null; render();
    });
    const fi=document.getElementById("fotoInput");
    if(fi) fi.addEventListener("change",e=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ currentFoto=ev.target.result; render(); }; r.readAsDataURL(f); } });
    const rf=document.getElementById("removeFoto");
    if(rf) rf.addEventListener("click",()=>{ currentFoto=null; if(state.modal.data) state.modal.data.foto=null; render(); });
  }

  // Appt form
  const af=document.getElementById("apptForm");
  if(af){
    document.querySelectorAll(".svc-chip").forEach(el=>el.addEventListener("click",()=>{
      const id=Number(el.dataset.svc);
      if(selectedServices.includes(id)) selectedServices=selectedServices.filter(x=>x!==id);
      else selectedServices.push(id);
      el.classList.toggle("active",selectedServices.includes(id));
      updateSummary();
    }));
    af.addEventListener("submit",e=>{
      e.preventDefault();
      const fd=new FormData(af);
      if(!fd.get("clienteId")||selectedServices.length===0){ toast("Seleziona cliente e almeno un servizio"); return; }
      state.appuntamenti.push({id:uid(),clienteId:Number(fd.get("clienteId")),data:fd.get("data"),ora:fd.get("ora"),servizi:[...selectedServices],note:fd.get("note"),completato:false,metodo:null});
      state.selectedDate=fd.get("data");
      state.view="calendario"; state.modal=null; render();
      toast("✅ Appuntamento prenotato!");
    });
  }
}

function updateSummary(){
  const s=document.getElementById("apptSummary"); if(!s)return;
  if(selectedServices.length===0){ s.style.display="none"; return; }
  s.style.display="flex";
  document.getElementById("sumTime").textContent="⏱ "+selectedServices.reduce((t,id)=>t+(getSvc(id)?.duration||0),0)+" minuti";
  document.getElementById("sumPrice").textContent="Totale: €"+selectedServices.reduce((t,id)=>t+(getSvc(id)?.price||0),0);
}

// Initial render
render();
</script>
</body>
</html>
